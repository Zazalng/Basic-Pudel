name: Build Plugin JARs

on:
  workflow_dispatch:
    inputs:
      modules:
        description: 'Modules to build (comma-separated, or "all")'
        required: false
        default: 'all'
        type: string

jobs:
  build:
    name: Build ${{ matrix.module }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - pudel-message
          - pudel-music
          - pudel-rolecolor

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'maven'

      - name: Check if module should be built
        id: check
        run: |
          INPUT="${{ github.event.inputs.modules }}"
          if [[ "$INPUT" == "all" || "$INPUT" == *"${{ matrix.module }}"* ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi

      - name: Build ${{ matrix.module }}
        if: steps.check.outputs.should_build == 'true'
        run: |
          mvn clean package -pl ${{ matrix.module }} -am --no-transfer-progress

      - name: Find built JARs
        if: steps.check.outputs.should_build == 'true'
        id: find_jars
        run: |
          # Find the main JAR (fat/shaded or regular), excluding *-sources and *-javadoc
          JAR=$(find ${{ matrix.module }}/target -maxdepth 1 -name "*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            ! -name "original-*.jar" \
            | sort | tail -n1)
          echo "jar_path=$JAR" >> $GITHUB_OUTPUT
          echo "Found JAR: $JAR"

      - name: Upload ${{ matrix.module }} artifact
        if: steps.check.outputs.should_build == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.module }}
          path: ${{ steps.find_jars.outputs.jar_path }}
          retention-days: 1
          if-no-files-found: error